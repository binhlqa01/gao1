<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chào mừng bé Gạo!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- DÁN VÀO ĐÂY: Video nền động -->
    <video autoplay muted loop playsinline id="myVideo" poster="nen.jpg">
    <source src="video.mp4" type="video/mp4">
</video>

    <div class="container">
        <!-- Các nội dung khác của bạn (Tiêu đề, Countdown...) nằm ở dưới này -->
        <section class="hero">
            ...
        </section>
    </div>
    
    <script src="script.js"></script>
</body>
<!-- Trình phát nhạc ẩn -->
<audio id="bg-music" loop>
    <source src="nhac.mp3" type="audio/mpeg">
</audio>

<!-- Nút bật/tắt nhạc cố định ở góc màn hình -->
<div id="music-control" onclick="toggleMusic()" style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; cursor: pointer; background: rgba(255,255,255,0.9); padding: 12px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 24px;">
    <span id="music-icon">🎵</span>
</div>
</html>
