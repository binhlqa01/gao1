<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chào mừng bé Gạo!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <section class="hero">
            <div class="overlay">
                <h1 class="title">Bé Gạo Is Coming...</h1>
                <p class="subtitle">Gia đình mình đang mong chờ thiên thần nhỏ</p>
                
                <div id="countdown">
    <div class="time-box"><span id="days">00</span><p>Ngày</p></div>
    <div class="time-box"><span id="hours">00</span><p>Giờ</p></div>
    <div class="time-box"><span id="minutes">00</span><p>Phút</p></div>
    <div class="time-box"><span id="seconds">00</span><p>Giây</p></div>
</div>

                <div class="message">
                    <p>"Mỗi hạt gạo nhỏ đều chứa đựng tình yêu lớn của Ba Mẹ."</p>
                    <p>Hẹn gặp con vào ngày 10/05!</p>
                </div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
<!-- Trình phát nhạc ẩn -->
<audio id="bg-music" loop>
    <source src="nhac.mp3" type="audio/mpeg">
</audio>

<!-- Nút bật/tắt nhạc cố định ở góc màn hình -->
<div id="music-control" onclick="toggleMusic()" style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; cursor: pointer; background: rgba(255,255,255,0.9); padding: 12px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 24px;">
    <span id="music-icon">🎵</span>
</div>
</html>
